  <text class="title" x="32" y="76">Nudge</text>
  <text class="desc" x="32" y="102">Parses messy student messages — English, Hinglish, or Marathi — into</text>
  <text class="desc" x="32" y="122">tasks with deadlines. Share straight from WhatsApp. Offline-first.</text>
  <text class="chip" x="32" y="152">Flutter · Dart · SQLite · Android share intents</text>
  <text class="arw" x="848" y="38" text-anchor="end">↗</text>
