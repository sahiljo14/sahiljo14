<svg width="880" height="176" viewBox="0 0 880 176" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nudge — student task manager that parses English, Hinglish, and Marathi messages into deadlines. Flutter, Dart, SQLite.">
  <style>
    .kick { font: 600 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing: 2px; fill: #6E7681; }
    .num  { fill: #7C86F8; }
    .title{ font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; letter-spacing: -0.3px; fill: #F0F6FC; }
    .desc { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; fill: #9198A1; }
    .chip { font: 500 11.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing: 0.5px; fill: #6E7681; }
    .dia  { font: 500 11.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #9198A1; }
    .diaB { font: 500 11.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #F0F6FC; }
    .arw  { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #6E7681; }
    .flow { offset-path: path('M 730 68 C 730 92, 718 100, 706 114'); opacity: 0; animation: flow 2.6s ease-in-out infinite; }
    @keyframes flow {
      0%   { offset-distance: 0%;   opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) { .flow { animation: none; opacity: 0; } }
  </style>
  <rect x="0.5" y="0.5" width="879" height="175" rx="12" fill="#161B22" stroke="#30363D"/>
