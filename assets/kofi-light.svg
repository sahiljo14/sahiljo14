<svg width="880" height="72" viewBox="0 0 880 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Support my work on Ko-fi — ko-fi.com/sahiljo">
  <style>
    .title { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; fill: #1F2328; }
    .mono  { font: 500 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing: 1.5px; fill: #818B98; }
    .arw   { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #818B98; }
    .steam { stroke: #4F46E5; opacity: 0; animation: rise 3s ease-in-out infinite; }
    .s2 { animation-delay: 1.5s; }
    @keyframes rise {
      0%   { opacity: 0;   transform: translateY(3px); }
      40%  { opacity: 0.8; }
      100% { opacity: 0;   transform: translateY(-4px); }
    }
    @media (prefers-reduced-motion: reduce) { .steam { animation: none; opacity: 0.6; transform: none; } }
  </style>
  <rect x="0.5" y="0.5" width="879" height="71" rx="12" fill="#F6F8FA" stroke="#D0D7DE"/>
  <path d="M34 32 h22 v12 a8 8 0 0 1 -8 8 h-6 a8 8 0 0 1 -8 -8 z" stroke="#59636E" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M56 34 h3 a5 5 0 0 1 0 10 h-3" stroke="#59636E" stroke-width="1.5" stroke-linecap="round"/>
  <path class="steam" d="M40 26 c 1.5 -2, -1.5 -4, 0 -6" stroke-width="1.4" stroke-linecap="round"/>
  <path class="steam s2" d="M48 26 c 1.5 -2, -1.5 -4, 0 -6" stroke-width="1.4" stroke-linecap="round"/>
